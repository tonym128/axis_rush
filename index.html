<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CYLINDER RACER 2026</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <div id="ui-layer">
      <!-- Main Menu -->
      <div id="main-menu" class="screen active">
        <h1>CYLINDER RACER</h1>
        <p class="subtitle">WIPEOUT x F-ZERO INSIDE/OUT</p>
        
        <div class="menu-section">
          <h3>SELECT VEHICLE</h3>
          <div class="button-group" id="vehicle-select">
            <button class="selected" data-val="0">Light (High Handling)</button>
            <button data-val="1">Balanced (All-Rounder)</button>
            <button data-val="2">Heavy (High Speed)</button>
          </div>
        </div>

        <div class="menu-section">
          <h3>SELECT TRACK</h3>
          <div class="button-group" id="map-select">
            <button class="selected" data-val="0">Neon Tube (Easy)</button>
            <button data-val="1">Acid Loop (Medium)</button>
            <button data-val="2">Void Cylinder (Hard)</button>
          </div>
        </div>

        <div class="menu-section">
          <h3>DIFFICULTY</h3>
          <div class="button-group" id="diff-select">
            <button class="selected" data-val="0">Novice</button>
            <button data-val="1">Pro</button>
            <button data-val="2">Elite</button>
          </div>
        </div>

        <button id="start-btn">START ENGINE</button>
      </div>

      <!-- HUD -->
      <div id="hud" class="screen">
        <div class="hud-top">
          <div id="pos-display">POS: 1/9</div>
          <div id="lap-display">LAP: 1/3</div>
        </div>
        <div class="hud-bottom">
          <div id="speed-display">SPEED: 0 KM/H</div>
          <div id="weapon-display">WEAPON: NONE</div>
        </div>
        <div id="message-display"></div>
      </div>

      <!-- Game Over -->
      <div id="game-over" class="screen">
        <h1 id="go-title">RACE FINISHED</h1>
        <p id="go-stats"></p>
        <button id="restart-btn">MAIN MENU</button>
      </div>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
